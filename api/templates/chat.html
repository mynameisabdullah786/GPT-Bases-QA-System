<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Assistant</title>

<style>

body{
font-family: Arial;
background:#f5f7fb;
margin:0;
}

#chat-container{
position:fixed;
bottom:20px;
right:20px;
width:350px;
height:500px;
background:white;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
overflow:hidden;
}

#chat-header{
background:#4a6cf7;
color:white;
padding:15px;
font-size:18px;
display:flex;
align-items:center;
}

#chat-header img{
width:30px;
margin-right:10px;
}

#chat-messages{
flex:1;
padding:15px;
overflow-y:auto;
background:#f9f9f9;
}

.message{
display:flex;
margin-bottom:12px;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.bubble{
max-width:70%;
padding:10px 14px;
border-radius:15px;
font-size:14px;
}

.user .bubble{
background:#4a6cf7;
color:white;
border-bottom-right-radius:4px;
}

.bot .bubble{
background:#e4e6eb;
border-bottom-left-radius:4px;
}

.avatar{
width:30px;
height:30px;
margin:0 8px;
}

#chat-input{
display:flex;
border-top:1px solid #ddd;
}

#chat-input input{
flex:1;
border:none;
padding:12px;
font-size:14px;
outline:none;
}

#chat-input button{
background:#4a6cf7;
border:none;
color:white;
padding:12px 18px;
cursor:pointer;
}

#chat-input button:hover{
background:#3b55d1;
}

</style>
</head>

<body>

<div id="chat-container">

<div id="chat-header">
<img src="https://cdn-icons-png.flaticon.com/512/4712/4712107.png">
AI Assistant
</div>

<div id="chat-messages"></div>

<div id="chat-input">
<input id="question" placeholder="Ask a question...">
<button onclick="sendQuestion()">Send</button>
</div>

</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const doc = urlParams.get("doc");
function addMessage(text, type){

let container=document.getElementById("chat-messages");

let msg=document.createElement("div");
msg.className="message "+type;

let bubble=document.createElement("div");
bubble.className="bubble";
bubble.innerText=text;

let avatar=document.createElement("img");
avatar.className="avatar";

if(type==="user"){
avatar.src="https://cdn-icons-png.flaticon.com/512/847/847969.png";
msg.appendChild(bubble);
msg.appendChild(avatar);
}
else{
avatar.src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png";
msg.appendChild(avatar);
msg.appendChild(bubble);
}

container.appendChild(msg);

container.scrollTop=container.scrollHeight;
}

async function sendQuestion(){

let input=document.getElementById("question");
let question=input.value;

if(!question) return;

addMessage(question,"user");

input.value="";

let res = await fetch("/ask",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
    question:question,
    doc:doc
})
});

let data=await res.json();

addMessage(data.answer,"bot");

}

</script>

</body>
</html>
